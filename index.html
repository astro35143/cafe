<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카페 키오스크 주문</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-gray-800 text-center">오늘의 메뉴 선택</h1>
        
        <!-- 카테고리 탭 -->
        <div class="flex space-x-2 mb-6 overflow-x-auto pb-2" id="categoryTabs">
            <button onclick="filterMenu('전체')" class="px-4 py-2 bg-blue-600 text-white rounded-lg font-bold whitespace-nowrap">전체</button>
            <button onclick="filterMenu('커피')" class="px-4 py-2 bg-white text-gray-700 rounded-lg font-bold border whitespace-nowrap">커피</button>
            <button onclick="filterMenu('에이드/스무디')" class="px-4 py-2 bg-white text-gray-700 rounded-lg font-bold border whitespace-nowrap">에이드/스무디</button>
            <button onclick="filterMenu('티')" class="px-4 py-2 bg-white text-gray-700 rounded-lg font-bold border whitespace-nowrap">티</button>
        </div>
        
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8" id="menuGrid"></div>

        <!-- 주문 결제 섹션 -->
        <div class="bg-white p-6 rounded-2xl shadow-lg">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">선택한 메뉴</h2>
            <ul id="orderList" class="space-y-3 h-48 overflow-y-auto mb-4"></ul>
            <div class="flex justify-between items-center bg-gray-50 p-4 rounded-xl">
                <span class="text-lg font-bold">결제 금액</span>
                <span id="totalPrice" class="text-2xl font-black text-blue-700">0원</span>
            </div>
            <div class="grid grid-cols-2 gap-4 mt-4">
                <button onclick="downloadExcel()" class="bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 transition-colors">엑셀 다운로드</button>
                <button onclick="resetOrder()" class="bg-gray-800 text-white py-3 rounded-xl font-bold hover:bg-black transition-colors">주문 완료</button>
            </div>
        </div>
    </div>

    <script>
        const menuItems = [
            { name: '아메리카노', price: 3000, category: '커피', img: 'https://images.unsplash.com/photo-1541167760496-1628856ab772?w=200&h=200&fit=crop' },
            { name: '카페라떼', price: 4000, category: '커피', img: 'https://placehold.co/200x200?text=Latte' },
            { name: '바닐라 라떼', price: 4500, category: '커피', img: 'https://placehold.co/200x200?text=Vanilla' },
            { name: '카푸치노', price: 4000, category: '커피', img: 'https://placehold.co/200x200?text=Cappuccino' },
            { name: '초코 라떼', price: 4500, category: '커피', img: 'https://placehold.co/200x200?text=Choco' },
            { name: '레몬 에이드', price: 5000, category: '에이드/스무디', img: 'https://placehold.co/200x200?text=Lemon' },
            { name: '자몽 에이드', price: 5000, category: '에이드/스무디', img: 'https://placehold.co/200x200?text=Grapefruit' },
            { name: '딸기 스무디', price: 5500, category: '에이드/스무디', img: 'https://placehold.co/200x200?text=Smoothie' },
            { name: '녹차 프라페', price: 5500, category: '에이드/스무디', img: 'https://placehold.co/200x200?text=GreenTea' },
            { name: '얼그레이 티', price: 3500, category: '티', img: 'https://placehold.co/200x200?text=EarlGrey' }
        ];

        let orders = [];
        let total = 0;

        function renderMenu(category = '전체') {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = '';
            const filtered = category === '전체' ? menuItems : menuItems.filter(i => i.category === category);
            
            filtered.forEach(item => {
                grid.innerHTML += `
                    <button onclick="addToOrder('${item.name}', ${item.price}, '${item.img}')" 
                            class="bg-white p-3 rounded-2xl shadow-sm hover:shadow-xl transition-all border border-gray-200 text-center">
                        <img src="${item.img}" class="w-full h-24 object-cover rounded-lg mb-2">
                        <h3 class="font-bold text-sm truncate">${item.name}</h3>
                        <p class="text-blue-600 font-semibold text-xs">${item.price.toLocaleString()}원</p>
                    </button>
                `;
            });
        }

        function filterMenu(category) {
            document.querySelectorAll('#categoryTabs button').forEach(btn => {
                btn.className = btn.innerText === category ? 
                    "px-4 py-2 bg-blue-600 text-white rounded-lg font-bold whitespace-nowrap" : 
                    "px-4 py-2 bg-white text-gray-700 rounded-lg font-bold border whitespace-nowrap";
            });
            renderMenu(category);
        }

        function addToOrder(name, price, img) {
            orders.push({ name, price });
            total += price;
            const orderList = document.getElementById('orderList');
            const li = document.createElement('li');
            li.className = "flex items-center justify-between bg-gray-50 p-2 rounded-lg";
            li.innerHTML = `
                <div class="flex items-center gap-3">
                    <span class="font-medium">${name}</span>
                </div>
                <span class="font-bold">${price.toLocaleString()}원</span>
            `;
            orderList.appendChild(li);
            document.getElementById('totalPrice').innerText = total.toLocaleString() + '원';
        }

        function downloadExcel() {
            if (orders.length === 0) return alert('주문 내역이 없습니다!');
            let csvContent = "\uFEFF메뉴명,가격\n";
            orders.forEach(o => csvContent += `${o.name},${o.price}\n`);
            csvContent += `총합계,${total}`;
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "주문내역.csv";
            link.click();
        }

        function resetOrder() {
            if (total === 0) return alert('메뉴를 선택해주세요!');
            alert('주문이 완료되었습니다!');
            orders = [];
            document.getElementById('orderList').innerHTML = '';
            total = 0;
            document.getElementById('totalPrice').innerText = '0원';
        }

        renderMenu();
    </script>
</body>
</html>
